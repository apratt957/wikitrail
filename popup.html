<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WikiTrail</title>
    <script src="./d3.v7.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        width: 480px;
        min-height: 520px;
        background: #0f0f0f;
        color: #f0f0f0;
        font-family: "Georgia", serif;
        display: flex;
        flex-direction: column;
      }

      /* ── Header ── */
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 18px 10px;
        border-bottom: 1px solid #222;
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .logo-icon {
        width: 22px;
        height: 22px;
        opacity: 0.9;
      }

      .logo-text {
        font-size: 17px;
        font-weight: bold;
        letter-spacing: 0.03em;
        color: #fff;
      }

      .logo-text span {
        color: #7eb8f7;
      }

      .status-pill {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 11px;
        color: #888;
        background: #1a1a1a;
        padding: 4px 10px;
        border-radius: 20px;
        border: 1px solid #2a2a2a;
      }

      .status-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #444;
        transition: background 0.3s;
      }

      .status-dot.active {
        background: #4caf77;
        box-shadow: 0 0 6px #4caf7788;
        animation: pulse 2s infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }

      /* ── Session info bar ── */
      #session-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 18px;
        font-size: 11px;
        color: #666;
        background: #141414;
        border-bottom: 1px solid #1e1e1e;
        min-height: 34px;
      }

      #session-bar .meta {
        display: flex;
        gap: 16px;
      }

      #session-bar .meta span {
        color: #999;
      }

      #session-bar .meta strong {
        color: #ccc;
      }

      /* ── Graph area ── */
      #graph-container {
        flex: 1;
        position: relative;
        overflow: hidden;
        background: #0f0f0f;
        min-height: 300px;
      }

      #graph-container svg {
        width: 100%;
        height: 100%;
      }

      .empty-state {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 10px;
        color: #333;
        font-size: 13px;
        text-align: center;
        padding: 20px;
      }

      .empty-state .empty-icon {
        font-size: 36px;
        opacity: 0.4;
      }

      .empty-state p {
        max-width: 220px;
        line-height: 1.5;
        color: #444;
      }

      /* ── D3 node/link styles ── */
      .link {
        stroke: #2a4a6b;
        stroke-width: 1.5px;
        marker-end: url(#arrow);
      }

      .node circle {
        fill: #1a2f4a;
        stroke: #7eb8f7;
        stroke-width: 1.5px;
        cursor: pointer;
        transition: fill 0.2s;
      }

      .node circle:hover {
        fill: #2a4a6b;
      }

      .node.start circle {
        fill: #1a3a2a;
        stroke: #4caf77;
      }

      .node.current circle {
        fill: #2a2a1a;
        stroke: #f7d67e;
        stroke-width: 2px;
      }

      .node text {
        fill: #ccc;
        font-size: 9.5px;
        font-family: "Georgia", serif;
        pointer-events: none;
        text-anchor: middle;
      }

      /* ── Tooltip ── */
      #tooltip {
        position: absolute;
        background: #1a1a1a;
        border: 1px solid #333;
        border-radius: 6px;
        padding: 8px 11px;
        font-size: 11px;
        color: #ccc;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.15s;
        max-width: 180px;
        line-height: 1.5;
        z-index: 10;
      }

      #tooltip.visible {
        opacity: 1;
      }

      #tooltip strong {
        display: block;
        color: #fff;
        margin-bottom: 3px;
        font-size: 12px;
      }

      /* ── Controls ── */
      #controls {
        padding: 10px 18px 14px;
        display: flex;
        gap: 8px;
        border-top: 1px solid #1e1e1e;
        background: #0f0f0f;
      }

      button {
        flex: 1;
        padding: 8px 12px;
        border-radius: 6px;
        border: 1px solid #2a2a2a;
        font-size: 12px;
        font-family: "Georgia", serif;
        cursor: pointer;
        transition: all 0.15s;
      }

      #btn-end {
        background: #1a1a1a;
        color: #e07070;
        border-color: #3a2020;
      }

      #btn-end:hover {
        background: #2a1515;
        border-color: #e07070;
      }

      #btn-end:disabled {
        opacity: 0.35;
        cursor: default;
      }

      #btn-history {
        background: #1a1a1a;
        color: #888;
        border-color: #2a2a2a;
      }

      #btn-history:hover {
        background: #222;
        color: #aaa;
      }

      #btn-export {
        background: #1a1a1a;
        color: #7eb8f7;
        border-color: #1e3a5a;
      }

      #btn-export:hover {
        background: #152030;
        border-color: #7eb8f7;
      }

      #btn-export:disabled {
        opacity: 0.35;
        cursor: default;
      }

      /* ── Past trails panel ── */
      #history-panel {
        display: none;
        flex-direction: column;
        position: absolute;
        inset: 0;
        background: #0f0f0f;
        z-index: 20;
        overflow-y: auto;
      }

      #history-panel.open {
        display: flex;
      }

      .history-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 18px;
        border-bottom: 1px solid #222;
        font-size: 13px;
        color: #ccc;
        position: sticky;
        top: 0;
        background: #0f0f0f;
      }

      #btn-close-history {
        flex: 0;
        padding: 4px 10px;
        font-size: 11px;
        color: #888;
      }

      .trail-item {
        padding: 12px 18px;
        border-bottom: 1px solid #181818;
        cursor: pointer;
        transition: background 0.1s;
      }

      .trail-item:hover {
        background: #161616;
      }

      .trail-item .trail-date {
        font-size: 10px;
        color: #555;
        margin-bottom: 4px;
      }

      .trail-item .trail-summary {
        font-size: 12px;
        color: #999;
      }

      .trail-item .trail-summary strong {
        color: #ccc;
      }

      .no-history {
        text-align: center;
        color: #444;
        font-size: 12px;
        padding: 40px 20px;
      }

      /* ── Notes Drawer ── */
      #notes-drawer {
        display: none;
        flex-direction: column;
        border-top: 1px solid #222;
        background: #111;
        max-height: 200px;
        overflow-y: auto;
        animation: slideUp 0.2s ease;
      }

      #notes-drawer.open {
        display: flex;
      }

      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .drawer-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 16px 6px;
        border-bottom: 1px solid #1e1e1e;
        position: sticky;
        top: 0;
        background: #111;
        z-index: 1;
      }

      .drawer-header .drawer-title {
        font-size: 12px;
        color: #ccc;
        font-weight: bold;
      }

      .drawer-header .drawer-title span {
        color: #7eb8f7;
      }

      .drawer-header .drawer-link {
        font-size: 11px;
        color: #7eb8f7;
        text-decoration: none;
        padding: 3px 8px;
        border: 1px solid #1e3a5a;
        border-radius: 4px;
        cursor: pointer;
        background: none;
        font-family: "Georgia", serif;
      }

      .drawer-header .drawer-link:hover {
        background: #152030;
      }

      #btn-close-drawer {
        flex: 0;
        padding: 2px 8px;
        font-size: 11px;
        color: #555;
        background: none;
        border: none;
        cursor: pointer;
        margin-left: 8px;
      }

      #btn-close-drawer:hover {
        color: #999;
      }

      .notes-list {
        padding: 8px 16px 12px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .note-item {
        background: #1a1a1a;
        border: 1px solid #242424;
        border-radius: 5px;
        padding: 8px 10px;
        font-size: 11px;
        color: #bbb;
        line-height: 1.5;
      }

      .note-item .note-time {
        font-size: 10px;
        color: #444;
        margin-top: 4px;
      }

      .no-notes {
        padding: 16px;
        text-align: center;
        color: #444;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <!-- Header -->
    <header>
      <div class="logo">
        <!-- Simple inline SVG trail icon -->
        <svg
          class="logo-icon"
          viewBox="0 0 22 22"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <circle cx="4" cy="11" r="2.5" stroke="#4caf77" stroke-width="1.5" />
          <circle cx="11" cy="5" r="2.5" stroke="#7eb8f7" stroke-width="1.5" />
          <circle cx="18" cy="11" r="2.5" stroke="#7eb8f7" stroke-width="1.5" />
          <circle cx="11" cy="17" r="2.5" stroke="#7eb8f7" stroke-width="1.5" />
          <line
            x1="6.5"
            y1="10"
            x2="8.5"
            y2="6.5"
            stroke="#2a4a6b"
            stroke-width="1.2"
          />
          <line
            x1="13.5"
            y1="6.5"
            x2="15.5"
            y2="10"
            stroke="#2a4a6b"
            stroke-width="1.2"
          />
          <line
            x1="15.5"
            y1="12.5"
            x2="13.5"
            y2="15.5"
            stroke="#2a4a6b"
            stroke-width="1.2"
          />
        </svg>
        <span class="logo-text">Wiki<span>Trail</span></span>
      </div>
      <div class="status-pill">
        <div class="status-dot" id="status-dot"></div>
        <span id="status-text">idle</span>
      </div>
    </header>

    <!-- Session meta bar -->
    <div id="session-bar">
      <div class="meta">
        <span><strong id="page-count">0</strong> articles</span>
        <span><strong id="time-elapsed">0m</strong> elapsed</span>
      </div>
      <span id="session-start-label"></span>
    </div>

    <!-- Graph -->
    <div id="graph-container">
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">🌐</div>
        <p>Open a Wikipedia article to start mapping your trail.</p>
      </div>
      <svg id="graph-svg"></svg>
      <div id="tooltip"></div>
    </div>

    <!-- Controls -->
    <div id="controls">
      <button id="btn-end" disabled>End Trail</button>
      <button id="btn-history">Past Trails</button>
      <button id="btn-export" disabled>Export PNG</button>
    </div>

    <!-- History panel (overlaid) -->
    <div id="history-panel">
      <div class="history-header">
        <span>Past Trails</span>
        <button id="btn-close-history">✕ Close</button>
      </div>
      <div id="history-list"></div>
    </div>

    <!-- Notes Drawer -->
    <div id="notes-drawer">
      <div class="drawer-header">
        <span class="drawer-title"
          >Notes — <span id="drawer-node-title"></span
        ></span>
        <div style="display: flex; align-items: center; gap: 6px">
          <a id="drawer-wiki-link" class="drawer-link" target="_blank"
            >Open article ↗</a
          >
          <button id="btn-close-drawer">✕</button>
        </div>
      </div>
      <div class="notes-list" id="notes-list"></div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
